eventflow.app.name=EventFlow
eventflow.app.environment=development
eventflow.app.base-url=http://localhost:8080/event-flow

eventflow.db.driver=com.mysql.cj.jdbc.Driver
eventflow.db.pool.min-idle=2
eventflow.db.pool.max-size=10
eventflow.db.pool.connection-timeout-ms=30000

# Leave the mail host and sender values unset until SMTP is ready.
# Supplying the SMTP values later will enable email delivery without further code changes.
# eventflow.mail.host=
# eventflow.mail.username=
# eventflow.mail.password=
# eventflow.mail.from-address=
eventflow.mail.port=587
eventflow.mail.tls.enabled=true
eventflow.mail.connection-timeout-ms=5000
eventflow.mail.read-timeout-ms=5000
eventflow.mail.write-timeout-ms=5000